# Nginx reverse proxy configuration for TrustLayer.
# Routes:  /api/ → FastAPI backend (port 8000)
#          /     → React frontend  (port 3000)
#
# ── HTTPS / SSL (future) ──────────────────────────────────────────────────────
# To enable HTTPS with Let's Encrypt (certbot):
#   1. Obtain certs: certbot certonly --standalone -d your-domain.com
#   2. Mount certs in docker-compose: ./nginx/certs:/etc/nginx/certs:ro
#   3. Uncomment the HTTPS server block below and comment out the HTTP one.
#   4. Add a redirect server block: listen 80 → return 301 https://$host$request_uri
# ─────────────────────────────────────────────────────────────────────────────

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ── Gzip compression ──────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ── HTTP server ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # ── API: proxy to FastAPI backend ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Prevent upstream timeouts on slow queries
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    # ── Static assets: long cache for hashed filenames ───────────────────────
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # ── Frontend: proxy to React / SPA ───────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Do not cache the HTML shell (cache-busting via hashed JS/CSS)
        add_header         Cache-Control "no-cache";
    }
}

