# Docker Compose for TrustLayer — provider-agnostic, works on any Linux VPS.
# Copy .env.example → .env and fill in values before running.
#
# Start:  docker compose -f deployment/docker-compose.yml up --build -d
# Stop:   docker compose -f deployment/docker-compose.yml down
# Logs:   docker compose -f deployment/docker-compose.yml logs -f

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-trustlayer}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trustlayer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trustlayer-network

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Override DATABASE_URL so the backend connects to the db container
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-trustlayer}
    depends_on:
      db:
        condition: service_healthy
    # Uncomment to expose backend directly (useful for debugging):
    # ports:
    #   - "8000:8000"
    networks:
      - trustlayer-network

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost}
    restart: unless-stopped
    # Uncomment to expose frontend directly (useful for debugging):
    # ports:
    #   - "3000:3000"
    networks:
      - trustlayer-network

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"  # Uncomment when SSL is configured
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro  # Mount SSL certs here
    depends_on:
      - backend
      - frontend
    networks:
      - trustlayer-network

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  db-data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  trustlayer-network:
    driver: bridge
